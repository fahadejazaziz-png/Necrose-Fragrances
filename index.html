<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Necrose Fragrances</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 20px;
  border-bottom: 1px solid #eee;
}

header .logo img {
  height: 120px;
  max-width: 230px;
}

header nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #000;
  font-weight: 500;
}

/* ANNOUNCEMENT */
.announcement {
  background: #0077cc;
  color: #fff;
  text-align: center;
  padding: 10px;
  font-weight: 500;
}

/* ANIMATION TEXT */
.announcement-text {
  opacity: 0;
  transition: 0.5s;
}

.announcement-text.show {
  opacity: 1;
}

/* BANNER FIXED */
.banner {
  width: 100%;
  height: 420px;
  background: url('banner[1].png') center/contain no-repeat;
  background-color: #000;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
  padding: 40px;
}

.product-card {
  border: 1px solid #ddd;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.4s;
  opacity: 0;
  transform: translateY(40px);
}

.product-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.product-card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.product-card:hover {
  transform: translateY(-5px);
}

.product-info {
  text-align: center;
  padding: 15px;
}

.product-info span {
  color: #0077cc;
  font-weight: bold;
}

.order-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 15px;
  background: #0077cc;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
}

/* MOBILE */
@media(max-width:768px){
  .banner {
    height: 250px;
  }

  header .logo img {
    height: 90px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="new_logo[1].png">
  </div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Perfumes</a>
    <a href="#">New</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="announcement">
  <div class="announcement-text" id="announcementText">
    You Can't Wear It, It Becomes You
  </div>
</div>

<div class="banner"></div>

<section class="products">

<div class="product-card">
<img src="BlackRose.jpg">
<div class="product-info">
<h3>Black Rose</h3>
<p>Luxury fragrance</p>
<span>2500 PKR</span><br>
<a class="order-btn" href="#">Order Now</a>
</div>
</div>

<div class="product-card">
<img src="Intenseyou.jpg">
<div class="product-info">
<h3>Intense You</h3>
<p>Deep fragrance</p>
<span>2500 PKR</span><br>
<a class="order-btn" href="#">Order Now</a>
</div>
</div>

<div class="product-card">
<img src="Kaptan.jpg">
<div class="product-info">
<h3>Kaptan</h3>
<p>Fresh scent</p>
<span>2500 PKR</span><br>
<a class="order-btn" href="#">Order Now</a>
</div>
</div>

<div class="product-card">
<img src="LazzyGirl.png">
<div class="product-info">
<h3>Lazzy Girl</h3>
<p>Soft fragrance</p>
<span>2500 PKR</span><br>
<a class="order-btn" href="#">Order Now</a>
</div>
</div>

</section>

<script>
/* SCROLL ANIMATION */
const cards = document.querySelectorAll('.product-card');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
});

cards.forEach(card => observer.observe(card));

/* ANNOUNCEMENT ROTATION */
const texts = [
  "You Can't Wear It, It Becomes You",
  "Free Shipping Available",
  "Limited Stock!"
];

let i = 0;
const el = document.getElementById("announcementText");

setInterval(() => {
  el.classList.remove("show");
  setTimeout(()=>{
    i = (i+1) % texts.length;
    el.innerText = texts[i];
    el.classList.add("show");
  },300);
},3000);

el.classList.add("show");
</script>

</body>
</html>
