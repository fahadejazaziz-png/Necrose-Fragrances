<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NГ©crose Fragrances</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #FFD700;
}

/* HEADER */
header {
  position: relative;
  text-align: center;
  padding: 10px 0;
}

#logo {
  width: 180px;
  margin-bottom: 5px;
}

/* ANNOUNCEMENT */
#announcement {
  font-size: 20px;
  color: #B8860B;
  margin: 5px 0 10px 0;
  transition: opacity 0.6s;
}

/* BANNER */
#banner {
  width: 100%;
  height: 220px;
  object-fit: cover;
  margin: 0;
}

/* MENU */
#menu-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 28px;
  cursor: pointer;
}

#menu {
  display: none;
  position: absolute;
  top: 40px;
  left: 10px;
  background: #111;
  border: 1px solid #B8860B;
  padding: 10px;
}

#menu a {
  display: block;
  color: #FFD700;
  text-decoration: none;
  margin: 5px 0;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  padding: 15px;
}

.product {
  background: #111;
  padding: 10px;
  text-align: center;
}

.product img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* RESPONSIVE */
@media(max-width: 900px) {
  .products { grid-template-columns: repeat(3,1fr); }
}
@media(max-width: 500px) {
  .products { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>

<body>

<header>
  <div id="menu-btn">вӢ®</div>
  <div id="menu">
    <a href="#">Home</a>
    <a href="#">Perfume</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

  <img id="logo" src="logo.png">
  <div id="announcement"></div>
</header>

<img id="banner" src="banner.png">

<div class="products">

<div class="product"><img src="BlackRose.jpg"><p>BlackRose</p></div>
<div class="product"><img src="Intenseyou.jpg"><p>Intense You</p></div>
<div class="product"><img src="Kaptan.jpg"><p>Kaptan</p></div>
<div class="product"><img src="LazzyGirl.png"><p>Lazzy Girl</p></div>
<div class="product"><img src="Lumine.jpg"><p>Lumine</p></div>
<div class="product"><img src="Magny.jpg"><p>Magny</p></div>
<div class="product"><img src="Platinium.jpg"><p>Platinium</p></div>
<div class="product"><img src="Rose Bloom.jpg"><p>Rose Bloom</p></div>

</div>

<script>
/* ANNOUNCEMENT CHANGE */
const texts = [
"кңұбҙҖКҹбҙҮ КҹЙӘбҙ бҙҮ ЙўКҖбҙҖКҷ КҸбҙҸбҙңКҖкңұ ЙҙбҙҸбҙЎ",
"КҸбҙҸбҙң бҙ„бҙҖЙҙ'бҙӣ бҙЎбҙҮбҙҖКҖ ЙӘбҙӣ ЙӘбҙӣ КҷбҙҮбҙ„бҙҸбҙҚбҙҮкңұ КҸбҙҸбҙң"
];

let i = 0;
const el = document.getElementById("announcement");

function changeText(){
  el.style.opacity = 0;
  setTimeout(()=>{
    el.innerText = texts[i];
    el.style.opacity = 1;
    i = (i+1)%texts.length;
  },500);
}
changeText();
setInterval(changeText,5000);

/* MENU */
document.getElementById("menu-btn").onclick = ()=>{
  const m = document.getElementById("menu");
  m.style.display = m.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
