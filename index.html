<header>
  <div id="menu-container">
    <div id="menu-btn">&#x22EE;</div> <!-- vertical 3 dots -->
    <ul id="menu-items">
      <li><a href="#">Home</a></li>
      <li><a href="#products">Perfume</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </div>

  <img id="logo" src="logo.png" alt="Nécrose Logo">
  <div id="announcement"></div>
</header>

<style>
  #menu-container {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 1000;
  }
  #menu-btn {
    font-size: 30px;
    color: #FFD700;
    cursor: pointer;
    user-select: none;
  }
  #menu-items {
    display: none;
    list-style: none;
    padding: 10px;
    margin: 0;
    background-color: #0A0A0A;
    border: 1px solid #B8860B;
    border-radius: 5px;
    position: absolute;
    top: 40px;
    left: 0;
    min-width: 120px;
  }
  #menu-items li {
    margin: 5px 0;
  }
  #menu-items li a {
    text-decoration: none;
    color: #FFD700;
    font-weight: bold;
  }
  #menu-items li a:hover {
    color: #B8860B;
  }
</style>

<script>
  const menuBtn = document.getElementById('menu-btn');
  const menuItems = document.getElementById('menu-items');

  menuBtn.addEventListener('click', () => {
    if (menuItems.style.display === "block") {
      menuItems.style.display = "none";
    } else {
      menuItems.style.display = "block";
    }
  });

  // click outside to close
  document.addEventListener('click', (e) => {
    if (!menuBtn.contains(e.target) && !menuItems.contains(e.target)) {
      menuItems.style.display = "none";
    }
  });
</script>
