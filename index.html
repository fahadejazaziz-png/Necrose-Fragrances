<!DOCTYPE html>
<html>
<head>
  <title>Nécrose</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0A0A0A;
      color: #FFD700;
      font-family: Arial;
    }
    header {
      text-align: center;
      padding: 40px 20px;
      font-size: 32px;
      font-weight: bold;
    }
    .tagline {
      text-align: center;
      color: white;
      margin-top: -20px;
    }
    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      text-align: center;
    }
    button {
      background: #FFD700;
      color: black;
      border: none;
      padding: 10px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>Nécrose</header>
<p class="tagline">You Can't Wear It, It Becomes You</p>

<div class="products">
  <div class="card">
    <h3>Midnight Oud</h3>
    <p>Dark. Deep. Powerful.</p>
    <button>Order Now</button>
  </div>

  <div class="card">
    <h3>Golden Smoke</h3>
    <p>Warm. Rich. Addictive.</p>
    <button>Order Now</button>
  </div>
</div>

</body>
</html>
