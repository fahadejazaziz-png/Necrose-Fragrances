<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nécrose Fragrances</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #FFD700;
}

/* HEADER */
header {
  position: relative;
  text-align: center;
  padding: 10px 0;
}

#logo {
  width: 180px;
  margin-bottom: 5px;
}

/* ANNOUNCEMENT */
#announcement {
  font-size: 20px;
  color: #B8860B;
  margin: 5px 0 10px 0;
  transition: opacity 0.6s;
}

/* BANNER */
#banner {
  width: 100%;
  height: 220px;
  object-fit: cover;
  margin: 0;
}

/* MENU */
#menu-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 28px;
  cursor: pointer;
}
#menu {
  display: none;
  position: absolute;
  top: 40px;
  left: 10px;
  background: #111;
  border: 1px solid #B8860B;
  padding: 10px;
}
#menu a {
  display: block;
  color: #FFD700;
  text-decoration: none;
  margin: 5px 0;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  padding: 15px;
}
.product {
  background: #111;
  padding: 10px;
  text-align: center;
}
.product img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* BUTTON */
.order-btn {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 10px;
  background: linear-gradient(45deg, #FFD700, #B8860B);
  color: #000;
  text-decoration: none;
  border-radius: 4px;
  font-weight: bold;
}

/* RESPONSIVE */
@media(max-width: 900px){
  .products { grid-template-columns: repeat(3,1fr); }
}
@media(max-width: 500px){
  .products { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>

<body>

<header>
  <div id="menu-btn">⋮</div>
  <div id="menu">
    <a href="#">Home</a>
    <a href="#">Perfume</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>

  <img id="logo" src="logo.png">
  <div id="announcement"></div>
</header>

<img id="banner" src="banner.png">

<div class="products">

<div class="product">

</div>

</div>

<div class="product">

<p>Lazzy Girl</p>
<p>PKR 2500</p>

</div>

<script>
const texts = [
"ꜱᴀʟᴇ ʟɪᴠᴇ ɢʀᴀʙ ʏᴏᴜʀꜱ ɴᴏᴡ",
"ʏᴏᴜ ᴄᴀɴ'ᴛ ᴡᴇᴀʀ ɪᴛ ɪᴛ ʙᴇᴄᴏᴍᴇꜱ ʏᴏᴜ"
];

let i = 0;
const el = document.getElementById("announcement");

function changeText(){
  el.style.opacity = 0;
  setTimeout(()=>{
    el.innerText = texts[i];
    el.style.opacity = 1;
    i = (i+1)%texts.length;
  },500);
}
changeText();
setInterval(changeText,5000);

document.getElementById("menu-btn").onclick = ()=>{
  const m = document.getElementById("menu");
  m.style.display = m.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
