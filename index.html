<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Necrose Fragrances</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 30px;
  background: #fff;
}

/* LOGO */
.logo img {
  height: 110px;
}

/* NAV */
nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #333;
}

/* ANNOUNCEMENT */
.announcement {
  background: #0077cc;
  color: #fff;
  text-align: center;
  padding: 8px;
}

/* SLIM BANNER */
.banner {
  display: flex;
  justify-content: center;
  background: #000;
  padding: 5px 0;
}

.banner img {
  height: 90px;
  width: auto;
}

/* PRODUCTS */
.products {
  padding: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

/* CARD */
.product-card {
  border: 1px solid #eee;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.product-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* IMAGE */
.product-card img {
  width: 100%;
  height: 240px;
  object-fit: contain;
  padding: 10px;
}

/* INFO */
.product-info {
  text-align: center;
  padding: 12px;
}

.product-info h3 {
  margin-bottom: 8px;
}

/* PRICE ROW */
.price-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
}

.price-row span {
  font-weight: bold;
  color: #0077cc;
}

/* BUTTON */
.order-btn {
  background: #0077cc;
  color: #fff;
  padding: 6px 12px;
  border-radius: 5px;
  text-decoration: none;
  font-size: 13px;
}

/* MOBILE */
@media(max-width:768px){
  .logo img {
    height: 85px;
  }

  .banner img {
    height: 70px;
  }
}
</style>
</head>
